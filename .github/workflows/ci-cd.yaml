name: CI-CD-OKE

on:
  push:
    branches:
      - master

env:
  REGION: scl
  NAMESPACE: axdkgb7ur2sa
  REPO_NAME: tesis-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to OCIR
      env:
        OCIR_PASSWORD: ${{ secrets.OCIR_PASSWORD }}
        OCIR_USERNAME: ${{ secrets.OCIR_USERNAME }}
      run: |
        echo "$OCIR_PASSWORD" | docker login $REGION.ocir.io \
        -u "$OCIR_USERNAME" --password-stdin

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build and Push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        platforms: linux/arm64
        tags: ${{ env.REGION }}.ocir.io/${{ env.NAMESPACE }}/${{ env.REPO_NAME }}:latest

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3

    - name: Configure kubeconfig
      env:
        KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
      run: |
        echo "$KUBECONFIG_DATA" | base64 -d > kubeconfig
        export KUBECONFIG=$PWD/kubeconfig
        kubectl get nodes

    - name: Create OCIR image pull secret
      env:
        OCIR_PASSWORD: ${{ secrets.OCIR_PASSWORD }}
        OCIR_USERNAME: ${{ secrets.OCIR_USERNAME }}
      run: |
        export KUBECONFIG=$PWD/kubeconfig
        kubectl create secret docker-registry ocir-secret \
          --docker-server=$REGION.ocir.io \
          --docker-username="$OCIR_USERNAME" \
          --docker-password="$OCIR_PASSWORD" \
          --docker-email="$OCIR_USERNAME" \
          --namespace=tesis \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Deploy to OKE
      run: |
        export KUBECONFIG=$PWD/kubeconfig
        kubectl apply -f deployment.yaml
        kubectl apply -f service.yaml